<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap');
    </style>
    <title>helloimflix</title>
</head>

<body>
    <main>
        <!-- header -->
        <div id="header">
            <img src="helloimflix.png" class="headerImgDark">
            <img src="helloimflix-light.png" class="headerImgLight">
            <div id="tagLine">
                <p>extended bio for <a href="https://twitter.com/helloimflix">@helloimflix</a></p>
                <br>
                <button onclick="darkMode()" id="darkModeBtn">&#9790;</button>
            </div>
        </div>
        <!-- two column comission / about me -->
        <div class="parentColumn">
            <!--- commission side -->
            <div class="childColumn">
                <image src="halloweenflix.PNG" id="commission"></image>
            </div>
            <!-- about me side -->
            <div class="childColumn">
                <div class="aboutMe">
                <p><span id="aboutMeGreeting">HELLO, I'M FLIX !</span>
                <hr class="aboutMeHr"> 28 🎂 | puppy 🐶 | cinephile 🍿 | gay 🏳️‍🌈 | he/him ♂️
                <br> developer 🤓 | dbd enthusiast 🔪 | bear lover 🐻
                <hr class="aboutMeHr"> it's nice to meet you or see you again 🫶
                <br> i'm new to the fandom and looking for more friends !
                <hr class="aboutMeHr">
                <span id="followMeHere">follow me plz</span>
                </div>
                <div class="socials">
                <button class="socialsBtn" id="twt"><a href="https://x.com/helloimflix" class="socialLinks">twitter</a></button>
                <button class="socialsBtn" id="lbx"><a href="https://boxd.it/1oWPJ" class="socialLinks">letterboxd</a></button>
                <button class="socialsBtn" id="discord"><a href="https://discord.com/users/375779268602626048" class="socialLinks">discord</a></button>
                </div>
            </div>
        </div>
    </main>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
